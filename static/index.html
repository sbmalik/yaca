<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSE Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen bg-gray-100">
  <div class="flex h-full">
    <aside class="flex w-64 shrink-0 flex-col border-r border-gray-200 bg-white">
      <div class="border-b border-gray-200 p-4">
        <button id="new_chat"
          class="w-full rounded bg-blue-600 px-3 py-2 text-sm text-white hover:bg-blue-700">
          New Chat
        </button>
      </div>
      <div id="sidebar" class="flex-1 overflow-y-auto p-2">
        <p id="sidebar_loading" class="px-2 py-3 text-sm text-gray-400">Loading…</p>
      </div>
    </aside>

    <main class="flex min-w-0 flex-1 flex-col p-4">
      <div class="mx-auto flex h-full w-full max-w-2xl flex-col">
        <div class="mb-4 flex gap-2">
          <input type="text" id="user_message" placeholder="Type a message…"
            class="flex-1 rounded border border-gray-300 px-3 py-2" />
          <button id="connect"
            class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 disabled:opacity-50">
            Send
          </button>
        </div>
        <div id="output"
          class="min-h-0 flex-1 overflow-y-auto rounded border border-gray-200 bg-white p-4 whitespace-pre-wrap break-words">
        </div>
      </div>
    </main>
  </div>

  <script>
    const output = document.getElementById("output");
    const connectBtn = document.getElementById("connect");
    const userMessage = document.getElementById("user_message");
    const sidebar = document.getElementById("sidebar");
    const sidebarLoading = document.getElementById("sidebar_loading");
    const newChatBtn = document.getElementById("new_chat");

    const USER_ID = 1;
    let activeConversationId = null;

    function resolveConversationId() {
      if (activeConversationId) {
        return { conversationId: activeConversationId, isNewChat: false };
      }
      const conversationId = crypto.randomUUID();
      activeConversationId = conversationId;
      return { conversationId, isNewChat: true };
    }

    function roleClasses(role) {
      return role === "user"
        ? { label: "text-blue-600", text: "text-blue-600" }
        : { label: "text-gray-600", text: "text-gray-900" };
    }

    function appendMessage(role, content) {
      const classes = roleClasses(role);
      const wrapper = document.createElement("div");
      wrapper.className = "mb-3";

      const label = document.createElement("span");
      label.className = `${classes.label} text-sm font-semibold capitalize`;
      label.textContent = `${role}: `;

      const text = document.createElement("span");
      text.className = classes.text;
      text.textContent = content;

      wrapper.append(label, text);
      output.appendChild(wrapper);
      output.scrollTop = output.scrollHeight;
      return text;
    }

    function renderMessages(messages) {
      output.innerHTML = "";
      for (const msg of messages) {
        appendMessage(msg.role, msg.content);
      }
    }

    function setActiveConversation(id) {
      activeConversationId = id;
      for (const btn of sidebar.querySelectorAll("[data-conversation-id]")) {
        btn.classList.toggle("bg-blue-50", btn.dataset.conversationId === id);
        btn.classList.toggle("text-blue-700", btn.dataset.conversationId === id);
      }
    }

    async function loadConversations() {
      const response = await fetch(`/conversations?user_id=${USER_ID}`);
      if (!response.ok) {
        sidebar.innerHTML = `<p class="px-2 py-3 text-sm text-red-500">Failed to load conversations</p>`;
        return;
      }

      const conversations = await response.json();
      sidebar.innerHTML = "";

      if (conversations.length === 0) {
        sidebar.innerHTML = `<p class="px-2 py-3 text-sm text-gray-400">No conversations yet</p>`;
        return;
      }

      for (const conversation of conversations) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.dataset.conversationId = conversation.id;
        btn.className =
          "mb-1 w-full rounded px-3 py-2 text-left text-sm text-gray-700 hover:bg-gray-100";
        btn.textContent = conversation.title;
        btn.addEventListener("click", () => selectConversation(conversation.id));
        sidebar.appendChild(btn);
      }
    }

    async function selectConversation(conversationId) {
      setActiveConversation(conversationId);

      const response = await fetch(`/conversations/${conversationId}/messages`);
      if (!response.ok) {
        output.textContent = "Failed to load messages.";
        return;
      }

      const messages = await response.json();
      renderMessages(messages);
    }

    function startNewChat() {
      activeConversationId = null;
      output.innerHTML = "";
      userMessage.value = "";
      for (const btn of sidebar.querySelectorAll("[data-conversation-id]")) {
        btn.classList.remove("bg-blue-50", "text-blue-700");
      }
      userMessage.focus();
    }

    function parseSseData(raw) {
      try {
        return JSON.parse(raw);
      } catch {
        return raw;
      }
    }

    let currentAssistantNode = null;

    function handleAiEvent(data) {
      if (data === "__START__") {
        currentAssistantNode = appendMessage("assistant", "");
      } else if (data === "__END__") {
        currentAssistantNode = null;
      } else if (data === "__ERROR__") {
        if (!currentAssistantNode) currentAssistantNode = appendMessage("assistant", "");
        currentAssistantNode.textContent = "⚠️ Something went wrong. Please try again.";
        currentAssistantNode.classList.add("text-red-500");
        currentAssistantNode = null;
      } else if (data) {
        if (!currentAssistantNode) currentAssistantNode = appendMessage("assistant", "");
        currentAssistantNode.textContent += data;
        output.scrollTop = output.scrollHeight;
      }
    }

    function parseSseChunk(chunk, onEvent) {
      const events = chunk.split("\n\n");
      for (const eventBlock of events) {
        if (!eventBlock.trim() || eventBlock.startsWith(":")) continue;

        let eventType = "message";
        let data = "";

        for (const line of eventBlock.split("\n")) {
          if (line.startsWith("event: ")) {
            eventType = line.slice(7);
          } else if (line.startsWith("data: ")) {
            data += line.slice(6);
          }
        }

        if (eventType === "AI" && data !== "") {
          onEvent(parseSseData(data));
        }
      }
    }

    connectBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const message = userMessage.value.trim();
      if (!message) return;

      const { conversationId } = resolveConversationId();
      appendMessage("user", message);
      userMessage.value = "";

      connectBtn.disabled = true;

      try {
        const response = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            conversation_id: conversationId,
          }),
        });

        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() ?? "";

          for (const part of parts) {
            parseSseChunk(part + "\n\n", handleAiEvent);
          }
        }

        if (buffer.trim()) {
          parseSseChunk(buffer, handleAiEvent);
        }
      } catch (err) {
        appendMessage("assistant", `⚠️ Error: ${err.message}`).classList.add("text-red-500");
        currentAssistantNode = null;
      } finally {
        connectBtn.disabled = false;
      }
    });

    newChatBtn.addEventListener("click", startNewChat);
    loadConversations();
  </script>
</body>

</html>
