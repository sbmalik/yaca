<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSE Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">
  <div class="mx-auto max-w-2xl">
    <div class="mb-4 flex gap-2">
      <input type="text" id="user_message" placeholder="Type a message…"
        class="flex-1 rounded border border-gray-300 px-3 py-2" />
      <button id="connect"
        class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 disabled:opacity-50">
        Send
      </button>
    </div>
    <div id="output"
      class="min-h-[200px] rounded border border-gray-200 bg-white p-4 whitespace-pre-wrap break-words">
    </div>
  </div>

  <script>
    const output = document.getElementById("output");
    const connectBtn = document.getElementById("connect");
    const userMessage = document.getElementById("user_message");

    function parseSseData(raw) {
      try {
        return JSON.parse(raw);
      } catch {
        return raw;
      }
    }

    function handleAiEvent(data) {
      if (data === "__START__") {
        output.innerHTML = "";
      } else if (data === "__END__") {
        output.innerHTML += "\n";
      } else if (data) {
        output.innerHTML += data;
      }
    }

    function parseSseChunk(chunk, onEvent) {
      const events = chunk.split("\n\n");
      for (const eventBlock of events) {
        if (!eventBlock.trim() || eventBlock.startsWith(":")) continue;

        let eventType = "message";
        let data = "";

        for (const line of eventBlock.split("\n")) {
          if (line.startsWith("event: ")) {
            eventType = line.slice(7);
          } else if (line.startsWith("data: ")) {
            data += line.slice(6);
          }
        }

        if (eventType === "AI" && data !== "") {
          onEvent(parseSseData(data));
        }
      }
    }

    connectBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      output.textContent = "";
      connectBtn.disabled = true;

      try {
        const response = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userMessage.value }),
        });

        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() ?? "";

          for (const part of parts) {
            parseSseChunk(part + "\n\n", handleAiEvent);
          }
        }

        if (buffer.trim()) {
          parseSseChunk(buffer, handleAiEvent);
        }
      } catch (err) {
        output.textContent = `Error: ${err.message}`;
      } finally {
        connectBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
